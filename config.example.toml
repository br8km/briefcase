# Example configuration for briefcase.
#
# `password_hash` and `encryption_key` are normally generated by:
# `briefcase config init --password <password> --password-hint <hint>`

[general]
password_hint = "Your password hint here"
password_hash = ""
encryption_key = ""
max_retention = 10
text_editor = "vi"

[source.firefox]
enabled = false
dir = "/path/to/firefox/profile"
frequency = "Daily"

[source.folder]
enabled = false
dir = "/path/to/sensitive/folder"
frequency = "Daily"

[remote.dropbox]
name = "dropbox"
enabled = false

[remote.onedrive]
name = "onedrive"
enabled = false

[remote.iclouddrive]
name = "iclouddrive"
enabled = false

[remote.sftp]
name = "sftp"
enabled = false
